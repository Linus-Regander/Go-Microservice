version: "3.9"

services:
  service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: go-microservice
    ports:
      - "8080:8080"
    environment:
      SERVICE_PORT: "8080"
      DB_HOST: "db"
      DB_PORT: "3306"
      DB_USERNAME: "root"
      DB_PASSWORD: "secret"
      DB_DATABASE: "go_microservice_db"
      DB_MIGRATOR_PATH: "assets/migrator"
    env_file:
      - .env