version: "3.9"

services:
  service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: go-microservice
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      SERVICE_PORT: ${SERVICE_PORT:-8080}
      DB_HOST: ${DB_HOST:-db}
      DB_PORT: ${DB_PORT:-3306}
      DB_USERNAME: ${DB_USERNAME:-}
      DB_PASSWORD: ${DB_PASSWORD:-}
      DB_DATABASE: ${DB_DATABASE:-go_microservice_db}
      DB_MIGRATIONS_PATH: ${DB_MIGRATIONS_PATH:-assets/migrations}
    env_file:
      - .env

  db:
    image: mariadb:10.6
    container_name: mariadb
    healthcheck:
      test:
        ["CMD-SHELL","mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-}
      MYSQL_DATABASE: go_microservice_db
    ports:
      - "3306:3306"